<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="答案之书 - 在心中默念你的问题，翻开书页，命运将给你指引">
  <meta property="og:title" content="答案之书">
  <meta property="og:description" content="在心中默念你的问题，翻开这本书">
  <meta property="og:type" content="website">
  <title>答案之书 · The Book of Answers</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <button class="floating-music-btn" id="btnMusicIntro" aria-label="背景音乐开关">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
    </svg>
    <span>音乐</span>
  </button>

  <!-- 引导页 -->
  <div class="screen intro-screen active" id="introScreen">
    <div class="magic-symbols intro-magic" aria-hidden="true">
      <span>✦</span><span>✧</span><span>☾</span><span>✺</span><span>✹</span><span>☽</span>
    </div>
    <div class="arcane-lines intro-lines" aria-hidden="true">
      <span></span><span></span><span></span><span></span>
    </div>
    <div class="intro-particles" id="introParticles"></div>
    <div class="intro-content">
      <div class="intro-icon">✦</div>
      <h1 class="intro-title">答案之书</h1>
      <p class="intro-subtitle">The Book of Answers</p>
      <div class="intro-divider"></div>
      <p class="intro-desc">把手机轻轻靠近之后<br>请先在心里提出你的问题</p>
      <button class="btn-start" id="btnStart">
        <span>开始提问</span>
      </button>
    </div>
    <div class="intro-footer">
      <span class="brand-mark">✦ ANSWER BOOK ✦</span>
    </div>
  </div>

  <!-- 冥想页 -->
  <div class="screen meditation-screen" id="meditationScreen">
    <div class="meditation-bg"></div>
    <div class="meditation-content">
      <div class="meditation-circle" id="meditationCircle">
        <div class="circle-ring"></div>
        <div class="circle-ring ring-2"></div>
        <div class="circle-ring ring-3"></div>
        <div class="circle-core"></div>
      </div>
      <p class="meditation-text" id="meditationText">闭上眼睛</p>
      <p class="meditation-hint">在心中默念你的问题...</p>
    </div>
  </div>

  <!-- 答案页 -->
  <div class="screen answer-screen" id="answerScreen">
    <div class="magic-symbols answer-magic" aria-hidden="true">
      <span>✦</span><span>✧</span><span>✺</span><span>☄</span><span>✹</span><span>✶</span><span>☾</span><span>☽</span>
    </div>
    <div class="arcane-lines answer-lines" aria-hidden="true">
      <span></span><span></span><span></span><span></span><span></span><span></span>
    </div>
    <div class="rune-strip rune-top" aria-hidden="true">✦ ✧ ☾ ✺ ✧ ✦</div>
    <div class="rune-strip rune-bottom" aria-hidden="true">✧ ☽ ✦ ✹ ☾ ✧</div>
    <div class="crystal crystal-one"></div>
    <div class="crystal crystal-two"></div>
    <div class="mystic-orbit orbit-one"></div>
    <div class="mystic-orbit orbit-two"></div>
    <div class="moon-phase phase-left">☾</div>
    <div class="moon-phase phase-right">☽</div>
    <div class="zodiac-wheel" aria-hidden="true">
      <span>♈</span><span>♉</span><span>♊</span><span>♋</span><span>♌</span><span>♍</span>
      <span>♎</span><span>♏</span><span>♐</span><span>♑</span><span>♒</span><span>♓</span>
    </div>
    <div class="answer-particles" id="answerParticles"></div>
    <div class="answer-card" id="answerCard">
      <div class="card-decoration top-left"></div>
      <div class="card-decoration top-right"></div>
      <div class="card-decoration bottom-left"></div>
      <div class="card-decoration bottom-right"></div>
      <div class="card-inner">
        <div class="answer-category" id="answerCategory"></div>
        <div class="answer-text" id="answerText"></div>
        <div class="answer-message" id="answerMessage"></div>
        <div class="answer-english" id="answerEnglish"></div>
      </div>
      <div class="answer-changing" id="answerChanging">
        <span class="changing-star">✦</span>
        <span>正在为你翻到新的那一页</span>
      </div>
      <div class="card-number" id="cardNumber"></div>
    </div>
    <div class="answer-actions">
      <button class="btn-action btn-music" id="btnMusic" aria-label="背景音乐开关">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
        </svg>
        <span>音乐</span>
      </button>
      <button class="btn-action btn-again" id="btnAgain">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M1 4v6h6M23 20v-6h-6"/>
          <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/>
        </svg>
        <span>再问一次</span>
      </button>
      <button class="btn-action btn-share" id="btnShare">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
          <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
          <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
        </svg>
        <span>分享答案</span>
      </button>
    </div>
    <div class="answer-footer">
      <span class="brand-mark">✦ ANSWER BOOK ✦</span>
    </div>
  </div>

  <!-- 分享画布 -->
  <canvas id="shareCanvas" style="display:none;"></canvas>

  <!-- 分享弹窗 -->
  <div class="share-modal" id="shareModal">
    <div class="share-modal-content">
      <div class="share-preview" id="sharePreview"></div>
      <p class="share-tip">长按图片保存到相册</p>
      <button class="btn-close-share" id="btnCloseShare">关闭</button>
    </div>
  </div>

  <script src="answers.js"></script>
  <script src="script.js"></script>
</body>
</html>
